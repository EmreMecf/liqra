name: muhasebe
description: "Liqra — Kişisel Finans & Yatırım Asistanı"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI & Animasyon
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Grafikler
  fl_chart: ^0.68.0

  # State Management
  provider: ^6.1.2

  # DI — Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # HTTP Client
  dio: ^5.4.0

  # Immutable Models & Sealed States
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Yardımcılar
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2

  # Markdown render — AI yanıtları için
  flutter_markdown: ^0.7.3

  # OCR Fiş Okuma — kamera, galeri ve PDF
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Firebase — FAZ 5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  firebase_remote_config: ^5.1.3   # A/B test / feature flags
  cloud_firestore: ^5.4.4          # Gerçek veritabanı

  # Bildirim gösterme (ön plan)
  flutter_local_notifications: ^17.2.3

  # Splash screen
  flutter_native_splash: ^2.4.1

  # Social Sign-In
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Google Generative AI (Gemini) — resmi Flutter SDK
  google_generative_ai: ^0.4.7

  # URL açma — kampanya detay linkleri
  url_launcher: ^6.3.0

  # Güvenli yerel depolama (API key, token) — SharedPreferences şifrelenmez
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#05080F"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#05080F"

flutter_native_splash:
  color: "#0C1E30"
  image: assets/images/liqra_splash.png
  color_dark: "#0C1E30"
  image_dark: assets/images/liqra_splash.png
  fullscreen: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
